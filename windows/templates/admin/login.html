{{define "admin/login"}}
{{template "admin-header" .}}
<div class="container" style="max-width: 420px; margin-top: 80px;">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-lock-fill text-primary" style="font-size:2.5rem;"></i>
                <h4 class="mt-2 mb-0">{{t .Lang "login.title"}}</h4>
            </div>

            {{if .ErrorMessage}}
            <div class="alert alert-danger py-2">
                <i class="bi bi-exclamation-circle me-1"></i>{{.ErrorMessage}}
            </div>
            {{end}}

            <form method="POST" action="/admin/login">
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">{{t .Lang "login.email"}}</label>
                    <input type="email" class="form-control" id="email" name="email"
                           required autofocus value="{{.Email}}" autocomplete="username">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">{{t .Lang "login.password"}}</label>
                    <input type="password" class="form-control" id="password" name="password"
                           required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>{{t .Lang "login.submit"}}
                </button>
            </form>
        </div>
    </div>
</div>
{{template "admin-footer" .}}
{{end}}
